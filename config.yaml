paths:
  raw_dir: data/raw
  processed_dir: data/processed
  chunks_output: data/processed/chunks.jsonl   # legacy fallback; notebooks use data/processed/{nb_id}/chunks.jsonl
  lancedb_dir: data/lancedb
  lancedb_table: manual_chunks
  notebooks_registry: data/notebooks.json
  chats_dir: data/chats
  maps_dir: data/maps

models:
  embedding: nomic-embed-text
  reasoning: deepseek-r1:8b
  vision: minicpm-v          # multimodal model for diagram/image captioning

indexing:
  min_chunk_chars: 400
  max_chunk_chars: 1800
  overlap_chars: 200
  batch_size: 16
  pdf_pages_per_batch: 15
  batch_overlap_pages: 2         # pages repeated between batches to preserve cross-boundary context

retrieval:
  mode: hybrid
  top_k: 10            # maximised — offline system, no latency/cost penalty
  load_balance: true   # guarantee ≥1 chunk per source in context (prevents large docs crowding out small ones)

chat:
  show_thinking: false
  history_turns: 6

vision:
  enabled: true              # AMD iGPU via Vulkan (OLLAMA_VULKAN=1) — ~5-15s per image
  timeout: 120               # 120s — handles sliced wide wiring diagrams (2-slice = ~90s on iGPU)
  max_per_doc: 30            # raised from 10 — diagram-heavy manuals need higher cap

runtime:
  # Tuned for 32 GB RAM laptop with 16 logical processors
  ollama_num_thread: 12
  ollama_ctx_num: 16384      # doubled — accommodates 10 large chunks + memory summary + history
  ollama_num_predict: 4096   # fixed generous output ceiling; offline = no cost penalty

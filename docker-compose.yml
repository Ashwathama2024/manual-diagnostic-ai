version: '3.8'

services:
  manualiq:
    build: .
    container_name: manualiq-app
    ports:
      - "7860:7860"
    volumes:
      - ./data:/app/data
      - ./config.yaml:/app/config.yaml
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      - ollama
    # If host has GPU, uncomment below for hardware acceleration:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  ollama:
    image: ollama/ollama:latest
    container_name: manualiq-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # If host has GPU, uncomment below:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

volumes:
  ollama_data:
